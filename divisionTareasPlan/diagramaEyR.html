<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama ER — Restaurante</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f4f0;padding:24px 16px}
h1{font-size:17px;font-weight:500;text-align:center;margin-bottom:4px}
.sub{text-align:center;font-size:12px;color:#777;margin-bottom:20px}
.wrap{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:20px;overflow-x:auto}
svg{display:block;margin:0 auto}

/* tabla ER */
.tbl-header{font-weight:700;font-size:12px}
.tbl-pk{font-size:10.5px;fill:#b45309;font-family:monospace}
.tbl-fk{font-size:10.5px;fill:#1d4ed8;font-family:monospace}
.tbl-col{font-size:10.5px;fill:#374151;font-family:monospace}
.tbl-type{font-size:9.5px;fill:#9ca3af;font-family:monospace}

/* legend */
.leg{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:16px;font-size:11px;color:#555}
.leg-item{display:flex;align-items:center;gap:6px}
.leg-dot{width:12px;height:12px;border-radius:3px}
</style>
</head>
<body>
<h1>Diagrama Entidad-Relación — Sistema Restaurante</h1>
<p class="sub">7 tablas · 3 vistas · MySQL 8</p>
<div class="wrap">
<svg viewBox="0 0 900 640" width="900" height="640">
<defs>
  <marker id="crow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
    <path d="M10 2 L2 6 L10 10" fill="none" stroke="context-stroke" stroke-width="1.5"/>
    <line x1="10" y1="2" x2="10" y2="10" stroke="context-stroke" stroke-width="1.5"/>
  </marker>
  <marker id="one" viewBox="0 0 12 12" refX="2" refY="6" markerWidth="10" markerHeight="10" orient="auto">
    <line x1="2" y1="2" x2="2" y2="10" stroke="context-stroke" stroke-width="1.5"/>
    <line x1="5" y1="2" x2="5" y2="10" stroke="context-stroke" stroke-width="1.5"/>
  </marker>
</defs>

<!-- ───── ROLES (top-left) ───── -->
<g id="roles">
  <rect x="20" y="20" width="160" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <rect x="20" y="20" width="160" height="26" rx="8" fill="#d97706"/>
  <rect x="20" y="38" width="160" height="8" fill="#d97706"/>
  <text x="100" y="37" text-anchor="middle" fill="white" class="tbl-header">ROLES</text>
  <text x="30" y="62"  class="tbl-pk">🔑 id_rol</text>        <text x="130" y="62"  class="tbl-type">TINYINT</text>
  <text x="30" y="78"  class="tbl-col">   nombre</text>        <text x="130" y="78"  class="tbl-type">VARCHAR(30)</text>
  <text x="20" y="108" fill="#d97706" font-size="9" font-style="italic" x="100" text-anchor="middle">ADMIN · MOZO · COCINA</text>
</g>

<!-- ───── USUARIOS ───── -->
<g id="usuarios">
  <rect x="220" y="20" width="185" height="158" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="220" y="20" width="185" height="26" rx="8" fill="#1d4ed8"/>
  <rect x="220" y="38" width="185" height="8" fill="#1d4ed8"/>
  <text x="312" y="37" text-anchor="middle" fill="white" class="tbl-header">USUARIOS</text>
  <text x="230" y="62"  class="tbl-pk">🔑 id_usuario</text>   <text x="360" y="62"  class="tbl-type">INT</text>
  <text x="230" y="78"  class="tbl-col">   nombre</text>       <text x="360" y="78"  class="tbl-type">VARCHAR(60)</text>
  <text x="230" y="94"  class="tbl-col">   apellido</text>     <text x="360" y="94"  class="tbl-type">VARCHAR(60)</text>
  <text x="230" y="110" class="tbl-col">   usuario</text>      <text x="360" y="110" class="tbl-type">VARCHAR(40)</text>
  <text x="230" y="126" class="tbl-col">   contrasena</text>   <text x="360" y="126" class="tbl-type">VARCHAR(255)</text>
  <text x="230" y="142" class="tbl-fk">🔗 id_rol</text>       <text x="360" y="142" class="tbl-type">TINYINT</text>
  <text x="230" y="158" class="tbl-col">   activo</text>       <text x="360" y="158" class="tbl-type">BOOLEAN</text>
  <text x="230" y="170" class="tbl-col">   created_at</text>   <text x="360" y="170" class="tbl-type">TIMESTAMP</text>
</g>

<!-- ───── CATEGORIAS (top-right) ───── -->
<g id="categorias">
  <rect x="680" y="20" width="195" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="680" y="20" width="195" height="26" rx="8" fill="#16a34a"/>
  <rect x="680" y="38" width="195" height="8" fill="#16a34a"/>
  <text x="777" y="37" text-anchor="middle" fill="white" class="tbl-header">CATEGORIAS</text>
  <text x="690" y="62"  class="tbl-pk">🔑 id_categoria</text> <text x="840" y="62"  class="tbl-type">INT</text>
  <text x="690" y="78"  class="tbl-col">   nombre</text>       <text x="840" y="78"  class="tbl-type">VARCHAR(60)</text>
  <text x="690" y="94"  class="tbl-col">   descripcion</text>  <text x="840" y="94"  class="tbl-type">VARCHAR(200)</text>
  <text x="690" y="110" class="tbl-col">   activa</text>       <text x="840" y="110" class="tbl-type">BOOLEAN</text>
</g>

<!-- ───── PRODUCTOS (center-right) ───── -->
<g id="productos">
  <rect x="620" y="200" width="200" height="190" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="620" y="200" width="200" height="26" rx="8" fill="#16a34a"/>
  <rect x="620" y="218" width="200" height="8" fill="#16a34a"/>
  <text x="720" y="217" text-anchor="middle" fill="white" class="tbl-header">PRODUCTOS</text>
  <text x="630" y="242" class="tbl-pk">🔑 id_producto</text>  <text x="790" y="242" class="tbl-type">INT</text>
  <text x="630" y="258" class="tbl-col">   nombre</text>       <text x="790" y="258" class="tbl-type">VARCHAR(100)</text>
  <text x="630" y="274" class="tbl-col">   descripcion</text>  <text x="790" y="274" class="tbl-type">VARCHAR(300)</text>
  <text x="630" y="290" class="tbl-col">   precio</text>       <text x="790" y="290" class="tbl-type">DECIMAL(10,2)</text>
  <text x="630" y="306" class="tbl-col">   stock</text>        <text x="790" y="306" class="tbl-type">INT UNSIGNED</text>
  <text x="630" y="322" class="tbl-fk">🔗 id_categoria</text> <text x="790" y="322" class="tbl-type">INT</text>
  <text x="630" y="338" class="tbl-col">   disponible</text>   <text x="790" y="338" class="tbl-type">BOOLEAN</text>
  <text x="630" y="354" class="tbl-col">   created_at</text>   <text x="790" y="354" class="tbl-type">TIMESTAMP</text>
  <text x="630" y="370" class="tbl-col">   updated_at</text>   <text x="790" y="370" class="tbl-type">TIMESTAMP</text>
</g>

<!-- ───── MESAS (bottom-left) ───── -->
<g id="mesas">
  <rect x="20" y="240" width="185" height="126" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="20" y="240" width="185" height="26" rx="8" fill="#db2777"/>
  <rect x="20" y="258" width="185" height="8" fill="#db2777"/>
  <text x="112" y="257" text-anchor="middle" fill="white" class="tbl-header">MESAS</text>
  <text x="30" y="282" class="tbl-pk">🔑 id_mesa</text>     <text x="160" y="282" class="tbl-type">INT</text>
  <text x="30" y="298" class="tbl-col">   numero</text>      <text x="160" y="298" class="tbl-type">INT UNIQUE</text>
  <text x="30" y="314" class="tbl-col">   capacidad</text>   <text x="160" y="314" class="tbl-type">INT</text>
  <text x="30" y="330" class="tbl-col">   estado</text>      <text x="160" y="330" class="tbl-type">ENUM</text>
  <text x="112" y="358" text-anchor="middle" fill="#db2777" font-size="9" font-style="italic">LIBRE·OCUPADA·RESERVADA</text>
</g>

<!-- ───── PEDIDOS (center) ───── -->
<g id="pedidos">
  <rect x="300" y="260" width="200" height="190" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <rect x="300" y="260" width="200" height="26" rx="8" fill="#7c3aed"/>
  <rect x="300" y="278" width="200" height="8" fill="#7c3aed"/>
  <text x="400" y="277" text-anchor="middle" fill="white" class="tbl-header">PEDIDOS</text>
  <text x="310" y="302" class="tbl-pk">🔑 id_pedido</text>    <text x="470" y="302" class="tbl-type">INT</text>
  <text x="310" y="318" class="tbl-fk">🔗 id_mesa</text>      <text x="470" y="318" class="tbl-type">INT</text>
  <text x="310" y="334" class="tbl-fk">🔗 id_usuario</text>   <text x="470" y="334" class="tbl-type">INT</text>
  <text x="310" y="350" class="tbl-col">   estado</text>      <text x="470" y="350" class="tbl-type">ENUM</text>
  <text x="310" y="366" class="tbl-col">   total</text>       <text x="470" y="366" class="tbl-type">DECIMAL(10,2)</text>
  <text x="310" y="382" class="tbl-col">   observacion</text> <text x="470" y="382" class="tbl-type">VARCHAR(300)</text>
  <text x="310" y="398" class="tbl-col">   created_at</text>  <text x="470" y="398" class="tbl-type">TIMESTAMP</text>
  <text x="310" y="414" class="tbl-col">   updated_at</text>  <text x="470" y="414" class="tbl-type">TIMESTAMP</text>
  <text x="400" y="442" text-anchor="middle" fill="#7c3aed" font-size="9" font-style="italic">ABIERTO·EN_COCINA·LISTO·CERRADO</text>
</g>

<!-- ───── DETALLE_PEDIDO (bottom-center) ───── -->
<g id="detalle">
  <rect x="270" y="490" width="230" height="142" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="270" y="490" width="230" height="26" rx="8" fill="#ea580c"/>
  <rect x="270" y="508" width="230" height="8" fill="#ea580c"/>
  <text x="385" y="507" text-anchor="middle" fill="white" class="tbl-header">DETALLE_PEDIDO</text>
  <text x="280" y="532" class="tbl-pk">🔑 id_detalle</text>    <text x="466" y="532" class="tbl-type">INT</text>
  <text x="280" y="548" class="tbl-fk">🔗 id_pedido</text>     <text x="466" y="548" class="tbl-type">INT</text>
  <text x="280" y="564" class="tbl-fk">🔗 id_producto</text>   <text x="466" y="564" class="tbl-type">INT</text>
  <text x="280" y="580" class="tbl-col">   cantidad</text>      <text x="466" y="580" class="tbl-type">INT</text>
  <text x="280" y="596" class="tbl-col">   precio_unit</text>   <text x="466" y="596" class="tbl-type">DECIMAL(10,2)</text>
  <text x="280" y="612" class="tbl-col">   subtotal</text>      <text x="466" y="612" class="tbl-type">DECIMAL(10,2)</text>
  <text x="280" y="628" class="tbl-col">   observacion</text>   <text x="466" y="628" class="tbl-type">VARCHAR(200)</text>
</g>

<!-- ═══════ RELACIONES ═══════ -->
<!-- roles → usuarios (1:N) -->
<line x1="180" y1="76" x2="220" y2="76" stroke="#d97706" stroke-width="1.5" marker-start="url(#one)" marker-end="url(#crow)"/>

<!-- mesas → pedidos (1:N) -->
<line x1="205" y1="318" x2="300" y2="318" stroke="#db2777" stroke-width="1.5" marker-start="url(#one)" marker-end="url(#crow)"/>

<!-- usuarios → pedidos (1:N) -->
<line x1="405" y1="178" x2="405" y2="260" stroke="#1d4ed8" stroke-width="1.5" marker-start="url(#one)" marker-end="url(#crow)"/>

<!-- categorias → productos (1:N) -->
<line x1="777" y1="130" x2="777" y2="200" stroke="#16a34a" stroke-width="1.5" marker-start="url(#one)" marker-end="url(#crow)"/>

<!-- pedidos → detalle_pedido (1:N) -->
<line x1="400" y1="450" x2="390" y2="490" stroke="#7c3aed" stroke-width="1.5" marker-start="url(#one)" marker-end="url(#crow)"/>

<!-- productos → detalle_pedido (1:N) -->
<line x1="620" y1="340" x2="500" y2="580" stroke="#16a34a" stroke-width="1.5" marker-start="url(#one)" marker-end="url(#crow)"/>

<!-- Cardinality labels -->
<text x="240" y="70" font-size="10" fill="#d97706" font-weight="600">1</text>
<text x="200" y="70" font-size="10" fill="#d97706" font-weight="600">N</text>
<text x="260" y="312" font-size="10" fill="#db2777" font-weight="600">1</text>
<text x="210" y="312" font-size="10" fill="#db2777" font-weight="600">N</text>
<text x="395" y="200" font-size="10" fill="#1d4ed8" font-weight="600">1</text>
<text x="395" y="255" font-size="10" fill="#1d4ed8" font-weight="600">N</text>
<text x="782" y="165" font-size="10" fill="#16a34a" font-weight="600">1</text>
<text x="782" y="195" font-size="10" fill="#16a34a" font-weight="600">N</text>
<text x="408" y="475" font-size="10" fill="#7c3aed" font-weight="600">1</text>
<text x="398" y="488" font-size="10" fill="#7c3aed" font-weight="600">N</text>
<text x="565" y="445" font-size="10" fill="#16a34a" font-weight="600">1</text>
<text x="508" y="572" font-size="10" fill="#16a34a" font-weight="600">N</text>

</svg>
</div>

<div class="leg">
  <div class="leg-item"><div class="leg-dot" style="background:#d97706"></div>roles</div>
  <div class="leg-item"><div class="leg-dot" style="background:#1d4ed8"></div>usuarios</div>
  <div class="leg-item"><div class="leg-dot" style="background:#16a34a"></div>categorias / productos</div>
  <div class="leg-item"><div class="leg-dot" style="background:#db2777"></div>mesas</div>
  <div class="leg-item"><div class="leg-dot" style="background:#7c3aed"></div>pedidos</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ea580c"></div>detalle_pedido</div>
  <div class="leg-item">🔑 PK &nbsp; 🔗 FK</div>
</div>
</body>
</html>
